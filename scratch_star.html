<!DOCTYPE html>
<html>
<head>
<style>
  canvas { border: 1px solid #ccc; background: #fafafa; }
</style>
</head>
<body>
  <canvas id="canvas" width="400" height="400"></canvas>
  <script>
    const ctx = document.getElementById('canvas').getContext('2d');
    const cx = 200, cy = 200;
    
    // Parâmetros (pixels)
    const a = 300; // total span
    const s = 60;  // central square
    const b = 40;  // outer squares
    
    // Rotate 45 degrees
    ctx.translate(cx, cy);
    ctx.rotate(Math.PI / 4);
    ctx.translate(-cx, -cy);
    
    ctx.fillStyle = '#1a365d';
    ctx.strokeStyle = '#1a365d';
    ctx.lineWidth = 2;
    
    // Draw central square
    ctx.fillRect(cx - s/2, cy - s/2, s, s);
    
    // Draw 4 outer squares and lines
    const offset = a/2 - b/2;
    const positions = [
      {x: cx, y: cy - offset}, // Top
      {x: cx, y: cy + offset}, // Bottom
      {x: cx - offset, y: cy}, // Left
      {x: cx + offset, y: cy}  // Right
    ];
    
    positions.forEach(pos => {
      ctx.fillRect(pos.x - b/2, pos.y - b/2, b, b);
      
      // Draw lines from corners of outer square to center of central square
      // Actually, to the center of the central square? Or to the corners of the central square?
      // User said: "juntas as pontas dos quadrados laterais ao centro do quadrado central com uma linha"
      
      // Let's connect the 2 inner corners of the outer square to the origin (cx, cy)
      ctx.beginPath();
      if (pos.y < cy) { // Top
        ctx.moveTo(pos.x - b/2, pos.y + b/2);
        ctx.lineTo(cx, cy);
        ctx.moveTo(pos.x + b/2, pos.y + b/2);
        ctx.lineTo(cx, cy);
      } else if (pos.y > cy) { // Bottom
        ctx.moveTo(pos.x - b/2, pos.y - b/2);
        ctx.lineTo(cx, cy);
        ctx.moveTo(pos.x + b/2, pos.y - b/2);
        ctx.lineTo(cx, cy);
      } else if (pos.x < cx) { // Left
        ctx.moveTo(pos.x + b/2, pos.y - b/2);
        ctx.lineTo(cx, cy);
        ctx.moveTo(pos.x + b/2, pos.y + b/2);
        ctx.lineTo(cx, cy);
      } else if (pos.x > cx) { // Right
        ctx.moveTo(pos.x - b/2, pos.y - b/2);
        ctx.lineTo(cx, cy);
        ctx.moveTo(pos.x - b/2, pos.y + b/2);
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
    });
    
  </script>
</body>
</html>
