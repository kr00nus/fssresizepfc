<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FSS - Patch Quadrado (Chen)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: "Times New Roman", serif;
        background-color: #eef2f5;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      .dashboard {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 20px;
        max-width: 1300px;
        margin: auto;
      }
      .panel {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
      }
      h2 {
        text-align: center;
        color: #000;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        margin-top: 0;
        font-size: 1.4em;
      }

      .control-group {
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px dashed #eee;
      }
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
      }
      label {
        font-weight: bold;
        font-size: 0.9em;
      }
      input[type="number"] {
        width: 70px;
        padding: 4px;
        border: 1px solid #ccc;
        border-radius: 3px;
        font-family: "Times New Roman";
      }
      input[type="range"] {
        width: 100%;
        cursor: pointer;
      }

      .visuals {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .chart-container {
        position: relative;
        height: 400px;
        width: 100%;
        border: 1px solid #000;
        padding: 10px;
        box-sizing: border-box;
      }

      .geometry-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        border: 1px solid #000;
        padding: 15px;
        background: #fff;
      }
      canvas#shapeCanvas {
        background-color: #fafafa;
        border: 1px dashed #999;
      }
      .geo-legend {
        font-size: 0.85em;
        color: #555;
        margin-top: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <div class="panel">
        <h2>Parâmetros Físicos</h2>

        <div class="control-group">
          <div class="header-row">
            <label>Freq. Inicial (GHz)</label
            ><input type="number" id="fStart_num" value="1" step="1" />
          </div>
          <input
            type="range"
            id="fStart_slider"
            min="1"
            max="10"
            step="1"
            value="1"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Freq. Final (GHz)</label
            ><input type="number" id="fEnd_num" value="40" step="1" />
          </div>
          <input
            type="range"
            id="fEnd_slider"
            min="10"
            max="60"
            step="1"
            value="40"
          />
        </div>
        <div
          class="control-group"
          style="border-left: 4px solid #007bff; padding-left: 5px"
        >
          <div class="header-row">
            <label>Período p (mm)</label
            ><input type="number" id="p_num" value="10.0" step="0.1" />
          </div>
          <input
            type="range"
            id="p_slider"
            min="3.0"
            max="30.0"
            step="0.1"
            value="10.0"
          />
        </div>
        <div
          class="control-group"
          style="border-left: 4px solid #28a745; padding-left: 5px"
        >
          <div class="header-row">
            <label>Largura c (mm)</label
            ><input type="number" id="c_num" value="8.0" step="0.1" />
          </div>
          <input
            type="range"
            id="c_slider"
            min="1.0"
            max="29.0"
            step="0.1"
            value="8.0"
          />
        </div>
      </div>

      <div class="visuals">
        <div class="panel">
          <h2>Resposta de Transmissão (S21) - Passa-Baixa (Chen)</h2>
          <div class="chart-container">
            <canvas id="fssChart"></canvas>
          </div>
        </div>

        <div class="panel">
          <h2>Célula Unitária - Patch Quadrado</h2>
          <div class="geometry-container">
            <canvas id="shapeCanvas" width="400" height="400"></canvas>
            <div class="geo-legend">
              <strong>Linha pontilhada:</strong> Limites do período (p x p)<br />
              <strong>Azul Sólido:</strong> Metalização (Patch de largura c x
              c)<br />
              As células ao redor ilustram a periodicidade do arranjo.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // --- Sincronização UI ---
      function bindInputs(idPrefix) {
        const slider = document.getElementById(idPrefix + "_slider");
        const num = document.getElementById(idPrefix + "_num");
        slider.addEventListener("input", (e) => {
          num.value = parseFloat(e.target.value).toFixed(2);
          updateAll();
        });
        num.addEventListener("input", (e) => {
          slider.value = e.target.value;
          updateAll();
        });
      }
      ["fStart", "fEnd", "p", "c"].forEach(bindInputs);

      function mmToCm(value) {
        return value / 10;
      }

      let chart;

      // --- Desenho da Geometria (Patch Quadrado CAD) ---
      function drawGeometry(p, c) {
        const canvas = document.getElementById("shapeCanvas");
        const ctx = canvas.getContext("2d");
        const size = canvas.width;

        ctx.clearRect(0, 0, size, size);

        const viewSize = p * 2.2;
        const scale = size / viewSize;
        const center = size / 2;
        const pPixel = p * scale;
        const cPixel = c * scale;

        const offsets = [-pPixel, 0, pPixel];

        function drawSinglePatch(offsetX, offsetY, fillColor) {
          const cellLeft = center - pPixel / 2 + offsetX;
          const cellTop = center - pPixel / 2 + offsetY;
          const patchLeft = center - cPixel / 2 + offsetX;
          const patchTop = center - cPixel / 2 + offsetY;

          ctx.setLineDash([5, 5]);
          ctx.strokeStyle = "rgba(153, 153, 153, 0.4)";
          ctx.lineWidth = 1;
          ctx.strokeRect(cellLeft, cellTop, pPixel, pPixel);
          ctx.setLineDash([]);

          ctx.fillStyle = fillColor;
          ctx.fillRect(patchLeft, patchTop, cPixel, cPixel);
        }

        // Desenha a malha
        offsets.forEach((dx) =>
          offsets.forEach((dy) =>
            drawSinglePatch(
              dx,
              dy,
              dx === 0 && dy === 0 ? "#003366" : "rgba(0, 51, 102, 0.12)",
            ),
          ),
        );

        const cellLeft = center - pPixel / 2;
        const cellTop = center - pPixel / 2;
        const cellRight = center + pPixel / 2;
        const patchLeft = center - cPixel / 2;
        const patchTop = center - cPixel / 2;
        const patchRight = center + cPixel / 2;
        const patchBottom = center + cPixel / 2;

        ctx.fillStyle = "#000";
        ctx.font = "bold 13px 'Times New Roman'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.strokeStyle = "#cc0000";
        ctx.lineWidth = 1.2;

        function drawCota(
          x1,
          y1,
          x2,
          y2,
          text,
          textOffsetX,
          textOffsetY,
          isVertical = false,
        ) {
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          const tick = 4;
          ctx.beginPath();
          if (isVertical) {
            ctx.moveTo(x1 - tick, y1);
            ctx.lineTo(x1 + tick, y1);
            ctx.moveTo(x2 - tick, y2);
            ctx.lineTo(x2 + tick, y2);
          } else {
            ctx.moveTo(x1, y1 - tick);
            ctx.lineTo(x1, y1 + tick);
            ctx.moveTo(x2, y2 - tick);
            ctx.lineTo(x2, y2 + tick);
          }
          ctx.stroke();

          const txtX = (x1 + x2) / 2 + textOffsetX;
          const txtY = (y1 + y2) / 2 + textOffsetY;
          const metrics = ctx.measureText(text);
          ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
          ctx.fillRect(
            txtX - metrics.width / 2 - 4,
            txtY - 9,
            metrics.width + 8,
            18,
          );
          ctx.fillStyle = "#cc0000";
          ctx.fillText(text, txtX, txtY);
        }

        // Cota P
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(cellLeft, cellTop);
        ctx.lineTo(cellLeft, cellTop - 25);
        ctx.moveTo(cellRight, cellTop);
        ctx.lineTo(cellRight, cellTop - 25);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          cellLeft,
          cellTop - 18,
          cellRight,
          cellTop - 18,
          "p = " + p.toFixed(2),
          0,
          -10,
        );

        // Cota C Horizontal
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(patchLeft, patchBottom);
        ctx.lineTo(patchLeft, patchBottom + 25);
        ctx.moveTo(patchRight, patchBottom);
        ctx.lineTo(patchRight, patchBottom + 25);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          patchLeft,
          patchBottom + 18,
          patchRight,
          patchBottom + 18,
          "c = " + c.toFixed(2),
          0,
          10,
        );

        // Cota C Vertical
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(patchLeft, patchTop);
        ctx.lineTo(patchLeft - 25, patchTop);
        ctx.moveTo(patchLeft, patchBottom);
        ctx.lineTo(patchLeft - 25, patchBottom);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          patchLeft - 18,
          patchTop,
          patchLeft - 18,
          patchBottom,
          "c = " + c.toFixed(2),
          -20,
          0,
          true,
        );
      }

      // --- Simulação Matemática (Fórmula de Chen - Eq. 11 a 16) ---
      function updateAll() {
        const fStart = parseFloat(document.getElementById("fStart_num").value);
        const fEnd = parseFloat(document.getElementById("fEnd_num").value);
        let p = parseFloat(document.getElementById("p_num").value); // 'a' no documento
        let c = parseFloat(document.getElementById("c_num").value); // 'c' no documento

        if (c >= p) {
          c = p - 0.01;
          document.getElementById("c_num").value = c.toFixed(2);
          document.getElementById("c_slider").value = c;
        }

        drawGeometry(p, c);

        const df = 0.1;

        // Conversão rigorosa de ambas as variáveis físicas para centímetros
        const a_cm = mmToCm(p);
        const c_cm = mmToCm(c);

        const data = [];
        const labels = [];

        for (let freq = fStart; freq <= fEnd; freq += df) {
          const lamb = 30 / freq;
          let pt_dB = -60;

          try {
            const lamb_a = lamb / a_cm;
            const c_a = c_cm / a_cm;

            if (lamb_a > 1) {
              // Eq. 13
              const F1_sq = Math.pow(lamb_a, 2) - 1;
              const F1 = Math.sqrt(Math.abs(F1_sq));

              // Eq. 14
              const pi_c_a = Math.PI * c_a;
              const denom_F2 = 1 - 2 * Math.pow(c_a, 2);
              const F2 = Math.cos(pi_c_a) / denom_F2;

              // Eq. 15
              const F3 = pi_c_a !== 0 ? Math.sin(pi_c_a) / pi_c_a : 1;
              const F3_sq = Math.pow(F3, 2);

              // Eq. 16
              const F4_sq = 2 * Math.pow(lamb_a, 2) - 1;

              // Eq. 12: Cálculo da Susceptância Equivalente B (Y = jB)
              const term_inv_F1_sq_minus_1 = 1 / Math.sqrt(Math.abs(F1_sq - 1));
              const term_F1_sq_minus_F3_sq = Math.sqrt(Math.abs(F1_sq - F3_sq));
              const term_inv_F4_sq_minus_1 = 1 / Math.sqrt(Math.abs(F4_sq - 1));

              const B =
                0.5 *
                F1 *
                F2 *
                term_inv_F1_sq_minus_1 *
                term_F1_sq_minus_F3_sq *
                term_inv_F4_sq_minus_1;

              // Eq. 11: Coeficiente de Transmissão T
              const pt = 1 / (1 + Math.pow(B, 2));
              pt_dB = 10 * Math.log10(pt);
            } else {
              // Comportamento fora da região de validade (Lóbulos de difração)
              pt_dB = -60;
            }

            labels.push(freq.toFixed(1));
            if (!isFinite(pt_dB) || pt_dB < -60) pt_dB = -60;
            data.push(pt_dB);
          } catch (e) {
            data.push(-60);
          }
        }

        updateChart(labels, data);
      }

      function updateChart(labels, data) {
        const ctx = document.getElementById("fssChart").getContext("2d");
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Simulados (Patch Quadrado - Chen)",
                data: data,
                borderColor: "#000",
                borderWidth: 1.5,
                pointRadius: 0,
                fill: false,
                tension: 0.1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
              x: {
                title: {
                  display: true,
                  text: "Freqüência (GHz)",
                  font: { family: "Times New Roman", size: 14 },
                },
                grid: { color: "#eee" },
              },
              y: {
                min: -60,
                max: 0,
                title: {
                  display: true,
                  text: "Potência Transmitida (dB)",
                  font: { family: "Times New Roman", size: 14 },
                },
                grid: { color: "#eee" },
              },
            },
            plugins: {
              legend: { labels: { font: { family: "Times New Roman" } } },
            },
          },
        });
      }

      updateAll();
    </script>
  </body>
</html>
