<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FSS - Patch Quadrado (Chen)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="src/css/styles.css">
  </head>
  <body>
    <div class="dashboard">
      <div class="panel params">
        <h2>Parâmetros Físicos</h2>

        <div class="control-group">
          <div class="header-row">
            <label>Freq. Inicial (GHz)</label
            ><input type="number" id="fStart_num" value="0" step="1" />
          </div>
          <input
            type="range"
            id="fStart_slider"
            min="0"
            max="10"
            step="1"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Freq. Final (GHz)</label
            ><input type="number" id="fEnd_num" value="0" step="1" />
          </div>
          <input
            type="range"
            id="fEnd_slider"
            min="0"
            max="60"
            step="1"
            value="0"
          />
        </div>
        <div
          class="control-group"
          style="border-left: 4px solid #007bff; padding-left: 5px"
        >
          <div class="header-row">
            <label>Período p (mm)</label
            ><input type="number" id="p_num" value="0" step="0.1" />
          </div>
          <input
            type="range"
            id="p_slider"
            min="0"
            max="30.0"
            step="0.1"
            value="0"
          />
        </div>
        <div
          class="control-group"
          style="border-left: 4px solid #28a745; padding-left: 5px"
        >
          <div class="header-row">
            <label>Largura c (mm)</label
            ><input type="number" id="c_num" value="0" step="0.1" />
          </div>
          <input
            type="range"
            id="c_slider"
            min="0"
            max="29.0"
            step="0.1"
            value="0"
          />
        </div>
      </div>

      <div class="visuals">
        <div class="panel">
          <h2>Resposta de Transmissão (S21) - Passa-Baixa (Chen)</h2>
          <div class="chart-container">
            <canvas id="fssChart"></canvas>
          </div>
          <button id="exportBtn" style="margin-top:10px; padding:8px 16px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer;">Exportar CSV</button>
        </div>

        <div class="panel">
          <h2>Célula Unitária - Patch Quadrado</h2>
          <div class="geometry-container">
            <canvas id="shapeCanvas" width="400" height="400"></canvas>
            <div class="geo-legend">
              <strong>Linha pontilhada:</strong> Limites do período (p x p)<br />
              <strong>Azul Sólido:</strong> Metalização (Patch de largura c x
              c)<br />
              As células ao redor ilustram a periodicidade do arranjo.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/js/ui_quadrado.js"></script>
  </body>
</html>
