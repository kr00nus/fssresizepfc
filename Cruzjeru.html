<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FSS - Cruz de Jerusalém</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="panel params">
        <h2>Parâmetros Físicos</h2>
        <div class="control-group">
          <div class="header-row">
            <label>Freq. Inicial (GHz)</label
            ><input type="number" id="fStart_num" value="0" step="1" />
          </div>
          <input
            type="range"
            id="fStart_slider"
            min="0"
            max="10"
            step="1"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Freq. Final (GHz)</label
            ><input type="number" id="fEnd_num" value="0" step="1" />
          </div>
          <input
            type="range"
            id="fEnd_slider"
            min="0"
            max="60"
            step="1"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Período p (mm)</label
            ><input type="number" id="p_num" value="0" step="0.01" />
          </div>
          <input
            type="range"
            id="p_slider"
            min="0"
            max="2.0"
            step="0.01"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Tamanho Cruz d (mm)</label
            ><input type="number" id="d_num" value="0" step="0.005" />
          </div>
          <input
            type="range"
            id="d_slider"
            min="0"
            max="1.9"
            step="0.005"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Largura Fita w (mm)</label
            ><input type="number" id="w_num" value="0" step="0.01" />
          </div>
          <input
            type="range"
            id="w_slider"
            min="0"
            max="0.2"
            step="0.01"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Braço Principal h (mm)</label
            ><input type="number" id="h_num" value="0" step="0.01" />
          </div>
          <input
            type="range"
            id="h_slider"
            min="0"
            max="0.4"
            step="0.01"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Gap g (mm)</label
            ><input type="number" id="g_num" value="0" step="0.001" />
          </div>
          <input
            type="range"
            id="g_slider"
            min="0"
            max="0.1"
            step="0.001"
            value="0"
          />
        </div>
        <h3>Substrate Parameters</h3>
        <div class="control-group">
          <div class="header-row">
            <label>Substrate</label>
            <select id="substrate_select">
              <option value="manual">Manual</option>
              <option value="RO3003">RO3003 (εr=3.00, h=1.52mm)</option>
              <option value="RO3006">RO3006 (εr=6.50, h=1.28mm)</option>
            </select>
          </div>
        </div>

        <div class="control-group">
          <div class="header-row">
            <label>Substrate thickness h_sub (mm)</label>
            <input type="number" id="h_sub_num" value="1.00" step="0.01" />
          </div>
          <input
            type="range"
            id="h_sub_slider"
            min="0.1"
            max="5.0"
            step="0.01"
            value="1.00"
          />
        </div>

        <div class="control-group">
          <div class="header-row">
            <label>Real Permittivity (εr)</label>
            <input type="number" id="er_num" value="1.00" step="0.01" />
          </div>
          <input
            type="range"
            id="er_slider"
            min="1.0"
            max="10.0"
            step="0.01"
            value="1.00"
          />
        </div>

        <div
          class="control-group"
          style="background: #f8f9fa; padding: 5px; border-radius: 4px"
        >
          <div class="header-row">
            <label>Effective Dielectric (ε_eff)</label>
            <input
              type="number"
              id="er_eff_num"
              value="1.00"
              readonly
              style="
                background: #e9ecef;
                border: 1px solid #ced4da;
                color: #cc0000;
                font-weight: bold;
              "
            />
          </div>
        </div>
      </div>

      <div class="visuals">
        <div class="panel">
          <h2>Resposta de Transmissão (S21)</h2>
          <div class="chart-container">
            <canvas id="fssChart"></canvas>
          </div>
          <button
            id="exportBtn"
            style="
              margin-top: 10px;
              padding: 8px 16px;
              background: #007bff;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            Exportar CSV
          </button>
        </div>

        <div class="panel">
          <h2>Célula Unitária - Cruz de Jerusalém</h2>
          <div class="geometry-container">
            <canvas id="shapeCanvas" width="400" height="400"></canvas>
            <div class="geo-legend">
              <strong>Linha pontilhada:</strong> Limites da Célula Unitária (p x
              p)<br />
              As cotas representam com exatidão matemática o Modelo Equivalente
              de Langley.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/js/ui_cruzjeru.js"></script>
  </body>
</html>
