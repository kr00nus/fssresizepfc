<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FSS - Cruz de Jerusalém</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: "Times New Roman", serif;
        background-color: #eef2f5;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      .dashboard {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 20px;
        max-width: 1300px;
        margin: auto;
      }
      .panel {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
      }
      h2 {
        text-align: center;
        color: #000;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        margin-top: 0;
        font-size: 1.4em;
      }

      /* Controles */
      .control-group {
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px dashed #eee;
      }
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
      }
      label {
        font-weight: bold;
        font-size: 0.9em;
      }
      input[type="number"] {
        width: 70px;
        padding: 4px;
        border: 1px solid #ccc;
        border-radius: 3px;
        font-family: "Times New Roman";
      }
      input[type="range"] {
        width: 100%;
        cursor: pointer;
      }

      /* Visualizadores */
      .visuals {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .chart-container {
        position: relative;
        height: 400px;
        width: 100%;
        border: 1px solid #000;
        padding: 10px;
        box-sizing: border-box;
      }
      .geometry-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        border: 1px solid #000;
        padding: 15px;
        background: #fff;
      }
      canvas#shapeCanvas {
        background-color: #fafafa;
        border: 1px dashed #999;
      }
      .geo-legend {
        font-size: 0.85em;
        color: #555;
        margin-top: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <div class="panel">
        <h2>Parâmetros Físicos</h2>
        <div class="control-group">
          <div class="header-row">
            <label>Freq. Inicial (GHz)</label
            ><input type="number" id="fStart_num" value="0" step="1" />
          </div>
          <input
            type="range"
            id="fStart_slider"
            min="0"
            max="10"
            step="1"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Freq. Final (GHz)</label
            ><input type="number" id="fEnd_num" value="0" step="1" />
          </div>
          <input
            type="range"
            id="fEnd_slider"
            min="0"
            max="60"
            step="1"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Período p (mm)</label
            ><input type="number" id="p_num" value="0" step="0.01" />
          </div>
          <input
            type="range"
            id="p_slider"
            min="0"
            max="2.0"
            step="0.01"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Tamanho Cruz d (mm)</label
            ><input type="number" id="d_num" value="0" step="0.005" />
          </div>
          <input
            type="range"
            id="d_slider"
            min="0"
            max="1.9"
            step="0.005"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Largura Fita w (mm)</label
            ><input type="number" id="w_num" value="0" step="0.01" />
          </div>
          <input
            type="range"
            id="w_slider"
            min="0"
            max="0.2"
            step="0.01"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Braço Principal h (mm)</label
            ><input type="number" id="h_num" value="0" step="0.01" />
          </div>
          <input
            type="range"
            id="h_slider"
            min="0"
            max="0.4"
            step="0.01"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Gap g (mm)</label
            ><input type="number" id="g_num" value="0" step="0.001" />
          </div>
          <input
            type="range"
            id="g_slider"
            min="0"
            max="0.1"
            step="0.001"
            value="0"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Dielétrico (er)</label
            ><input type="number" id="er_num" value="0" step="0.01" />
          </div>
          <input
            type="range"
            id="er_slider"
            min="0"
            max="10.0"
            step="0.01"
            value="0"
          />
        </div>
      </div>

      <div class="visuals">
        <div class="panel">
          <h2>Resposta de Transmissão (S21)</h2>
          <div class="chart-container">
            <canvas id="fssChart"></canvas>
          </div>
          <button
            id="exportBtn"
            onclick="exportToCSV()"
            style="
              margin-top: 10px;
              padding: 8px 16px;
              background: #007bff;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            Exportar CSV
          </button>
        </div>

        <div class="panel">
          <h2>Célula Unitária - Cruz de Jerusalém</h2>
          <div class="geometry-container">
            <canvas id="shapeCanvas" width="400" height="400"></canvas>
            <div class="geo-legend">
              <strong>Linha pontilhada:</strong> Limites da Célula Unitária (p x
              p)<br />
              As cotas representam com exatidão matemática o Modelo Equivalente
              de Langley.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // --- Funções Matemáticas de Langley/Munk ---
      function csc(x) {
        return 1 / Math.sin(x);
      }

      function GG(p, w, lamb, ang) {
        const b = Math.sin((Math.PI * w) / (2 * p));
        const term1 = (2 * p * Math.sin(ang)) / lamb;
        const term2 = Math.pow((p * Math.cos(ang)) / lamb, 2);
        const Cp = 1 / Math.sqrt(1 + term1 - term2) - 1;
        const Cn = 1 / Math.sqrt(1 - term1 - term2) - 1;
        const b2 = b * b;
        const b4 = b2 * b2;
        const b6 = b2 * b4;
        const num =
          0.5 *
          Math.pow(1 - b2, 2) *
          ((1 - b2 / 4) * (Cp + Cn) + 4 * b2 * Cp * Cn);
        const den =
          1 -
          b2 / 4 +
          b2 * (1 + b2 / 2 - b4 / 8) * (Cp + Cn) +
          2 * b6 * Cp * Cn;
        return num / den;
      }

      function FF(p, w, lamb, ang) {
        const logTerm = Math.log(csc((Math.PI * w) / (2 * p)));
        return ((p * Math.cos(ang)) / lamb) * (logTerm + GG(p, w, lamb, ang));
      }

      function mmToCm(value) {
        return value / 10;
      }

      // --- Sincronização de Inputs UI ---
      function bindInputs(idPrefix) {
        const slider = document.getElementById(idPrefix + "_slider");
        const num = document.getElementById(idPrefix + "_num");
        slider.addEventListener("input", (e) => {
          num.value = parseFloat(e.target.value).toFixed(
            idPrefix === "g" || idPrefix === "d" ? 3 : 2,
          );
          updateAll();
        });
        num.addEventListener("input", (e) => {
          slider.value = e.target.value;
          updateAll();
        });
      }
      ["fStart", "fEnd", "p", "d", "w", "h", "g", "er"].forEach(bindInputs);

      let chart;

      // --- Desenho da Geometria (Modo Profissional CAD) ---
      function drawGeometry(p, d, w, h, g) {
        const canvas = document.getElementById("shapeCanvas");
        const ctx = canvas.getContext("2d");
        const size = canvas.width;

        ctx.clearRect(0, 0, size, size);

        // Zoom aprimorado para focar na central + vizinhos laterais
        const viewSize = p * 2.2;
        const scale = size / viewSize;
        const center = size / 2;

        const pPixel = p * scale;
        const dPixel = d * scale;
        const wPixel = w * scale;
        const hPixel = h * scale;

        // Função geométrica rigorosa: 'd' é a envergadura total da cruz interna.
        function drawJerusalemCross(cx, cy, isCenter) {
          ctx.fillStyle = isCenter ? "#003366" : "rgba(0, 51, 102, 0.12)";

          // Braços centrais
          ctx.fillRect(cx - dPixel / 2, cy - wPixel / 2, dPixel, wPixel); // Horizontal
          ctx.fillRect(cx - wPixel / 2, cy - dPixel / 2, wPixel, dPixel); // Vertical

          // Chapéus nas extremidades (ancorados rente às pontas do braço d)
          const capLength = 2 * hPixel + wPixel;

          ctx.fillRect(cx - capLength / 2, cy - dPixel / 2, capLength, wPixel); // Topo
          ctx.fillRect(
            cx - capLength / 2,
            cy + dPixel / 2 - wPixel,
            capLength,
            wPixel,
          ); // Base
          ctx.fillRect(cx - dPixel / 2, cy - capLength / 2, wPixel, capLength); // Esquerda
          ctx.fillRect(
            cx + dPixel / 2 - wPixel,
            cy - capLength / 2,
            wPixel,
            capLength,
          ); // Direita
        }

        // 1. Desenhar a malha adjacente
        const neighbors = [
          { i: 0, j: -1 },
          { i: 0, j: 1 },
          { i: -1, j: 0 },
          { i: 1, j: 0 },
        ];
        neighbors.forEach((n) =>
          drawJerusalemCross(
            center + n.i * pPixel,
            center + n.j * pPixel,
            false,
          ),
        );

        // 2. Desenhar Cruz Central
        drawJerusalemCross(center, center, true);

        // 3. Desenhar Limites da Célula Unitária (Pontilhado)
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "rgba(0, 0, 0, 0.25)";
        ctx.lineWidth = 1;
        ctx.strokeRect(
          center - pPixel / 2,
          center - pPixel / 2,
          pPixel,
          pPixel,
        );
        ctx.setLineDash([]);

        // ==========================================
        // 4. SISTEMA DE COTAS INTELIGENTES
        // ==========================================
        ctx.fillStyle = "#cc0000";
        ctx.strokeStyle = "#cc0000";
        ctx.lineWidth = 1.2;
        ctx.font = "bold 13px 'Times New Roman'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        function drawCota(
          x1,
          y1,
          x2,
          y2,
          text,
          textOffsetX,
          textOffsetY,
          isVertical = false,
        ) {
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          const tick = 4;
          ctx.beginPath();
          if (isVertical) {
            ctx.moveTo(x1 - tick, y1);
            ctx.lineTo(x1 + tick, y1);
            ctx.moveTo(x2 - tick, y2);
            ctx.lineTo(x2 + tick, y2);
          } else {
            ctx.moveTo(x1, y1 - tick);
            ctx.lineTo(x1, y1 + tick);
            ctx.moveTo(x2, y2 - tick);
            ctx.lineTo(x2, y2 + tick);
          }
          ctx.stroke();

          const txtX = (x1 + x2) / 2 + textOffsetX;
          const txtY = (y1 + y2) / 2 + textOffsetY;

          // Fundo branco no texto
          const m = ctx.measureText(text);
          ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
          ctx.fillRect(txtX - m.width / 2 - 2, txtY - 8, m.width + 4, 16);

          ctx.fillStyle = "#cc0000";
          ctx.fillText(text, txtX, txtY);
        }

        // --- Cota P (Período) ---
        const topY = center - pPixel / 2;
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        // Linhas de guia ancoradas perfeitamente nas quinas da célula pontilhada
        ctx.moveTo(center - pPixel / 2, topY);
        ctx.lineTo(center - pPixel / 2, topY - 25);
        ctx.moveTo(center + pPixel / 2, topY);
        ctx.lineTo(center + pPixel / 2, topY - 25);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          center - pPixel / 2,
          topY - 18,
          center + pPixel / 2,
          topY - 18,
          "p = " + p.toFixed(2),
          0,
          -10,
        );

        // --- Cota D (Comprimento Braço Principal) ---
        const dY = center + wPixel / 2 + 25;
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(center - dPixel / 2, center + wPixel / 2);
        ctx.lineTo(center - dPixel / 2, dY + 5);
        ctx.moveTo(center + dPixel / 2, center + wPixel / 2);
        ctx.lineTo(center + dPixel / 2, dY + 5);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          center - dPixel / 2,
          dY,
          center + dPixel / 2,
          dY,
          "d = " + d.toFixed(3),
          0,
          10,
        );

        // --- Cota W (Largura Fita) ---
        const wY = center + dPixel / 2 + 15;
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(center - wPixel / 2, center + dPixel / 4);
        ctx.lineTo(center - wPixel / 2, wY + 5);
        ctx.moveTo(center + wPixel / 2, center + dPixel / 4);
        ctx.lineTo(center + wPixel / 2, wY + 5);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          center - wPixel / 2,
          wY,
          center + wPixel / 2,
          wY,
          "w = " + w.toFixed(2),
          0,
          10,
        );

        // --- Cota H (Saliência lateral do Chapéu) ---
        const hStartX = center + wPixel / 2;
        const hEndX = center + hPixel + wPixel / 2;
        const hY = center - dPixel / 2 - 15;
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(hStartX, center - dPixel / 2);
        ctx.lineTo(hStartX, hY - 5);
        ctx.moveTo(hEndX, center - dPixel / 2);
        ctx.lineTo(hEndX, hY - 5);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(hStartX, hY, hEndX, hY, "h = " + h.toFixed(2), 0, -10);

        // --- Cota G (Gap visual entre limites das cruzes) ---
        // O gap físico na tela entre a borda da cruz central e a cruz vizinha
        const centralRightEdge = center + dPixel / 2;
        const neighborLeftEdge = center + pPixel - dPixel / 2;

        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(centralRightEdge, center);
        ctx.lineTo(centralRightEdge, center + 20);
        ctx.moveTo(neighborLeftEdge, center);
        ctx.lineTo(neighborLeftEdge, center + 20);
        ctx.stroke();

        ctx.strokeStyle = "#cc0000";
        drawCota(
          centralRightEdge,
          center + 12,
          neighborLeftEdge,
          center + 12,
          "g = " + g.toFixed(3),
          0,
          10,
        );
      }

      // --- Simulação Matemática ---
      function updateAll() {
        const fStart = parseFloat(document.getElementById("fStart_num").value);
        const fEnd = parseFloat(document.getElementById("fEnd_num").value);
        let p = parseFloat(document.getElementById("p_num").value);
        let d = parseFloat(document.getElementById("d_num").value);
        const w = parseFloat(document.getElementById("w_num").value);
        const h = parseFloat(document.getElementById("h_num").value);
        const g = parseFloat(document.getElementById("g_num").value);
        const er = parseFloat(document.getElementById("er_num").value);

        if (
          fStart <= 0 ||
          fEnd <= 0 ||
          p <= 0 ||
          d <= 0 ||
          w <= 0 ||
          h <= 0 ||
          g <= 0 ||
          er <= 0 ||
          fStart >= fEnd
        ) {
          if (chart) chart.destroy();
          return;
        }

        // Prevenção de erros físicos (d não pode ser maior que p)
        if (d >= p) d = p - 0.01;

        // 1. Atualizar o Desenho
        drawGeometry(p, d, w, h, g);

        // 2. Atualizar o Gráfico
        const df = 0.1;
        const pCm = mmToCm(p);
        const dCm = mmToCm(d);
        const wCm = mmToCm(w);
        const gCm = mmToCm(g);
        const hCm = mmToCm(h);

        const data = [];
        const labels = [];

        for (let freq = fStart; freq <= fEnd; freq += df) {
          const lamb = 30 / freq;
          const ang = 0;

          try {
            const XL1 = FF(pCm, wCm, lamb, ang);
            const Bg = ((4 * er * dCm) / pCm) * FF(pCm, gCm, lamb, ang);
            const Bd =
              ((4 * er * (2 * hCm + gCm)) / pCm) *
              FF(pCm, pCm - dCm, lamb, ang);
            const BC1 = Bg + Bd;
            const XL2 = (dCm / pCm) * FF(pCm, 2 * wCm, lamb, ang);

            const lamb3 = dCm / 0.43;
            const f3 = 30 / lamb3;
            const BC2 = (1 / XL2) * Math.pow(freq / f3, 2);

            const Y1 = 1 / (XL1 - 1 / BC1);
            const Y2 = 1 / (XL2 - 1 / BC2);
            const Yt = Y1 + Y2;

            const ct = 1 / Math.sqrt(1 + 0.25 * Math.pow(Yt, 2));
            const pt = Math.pow(ct, 2);
            const pt_dB = 10 * Math.log10(pt);

            labels.push(freq.toFixed(1));
            data.push(Math.max(-60, pt_dB));
          } catch (e) {
            data.push(0);
          }
        }

        updateChart(labels, data);
      }

      function updateChart(labels, data) {
        const ctx = document.getElementById("fssChart").getContext("2d");
        if (chart) chart.destroy();

        // Detectar até duas ressonâncias locais (dois vales) e calcular suas BWs
        // 1) Encontrar todos os mínimos locais
        const minima = [];
        for (let i = 1; i < data.length - 1; i++) {
          if (data[i] < data[i - 1] && data[i] <= data[i + 1]) {
            minima.push({ idx: i, val: data[i] });
          }
        }
        // Se não houver mínimos locais detectados, usar o mínimo global
        const globalMinIndex = data.indexOf(Math.min(...data));
        const globalMinVal = data[globalMinIndex];
        if (minima.length === 0) minima.push({ idx: globalMinIndex, val: globalMinVal });

        // Ordenar pelos vales mais profundos e escolher até 2
        minima.sort((a, b) => a.val - b.val);
        const selected = minima.slice(0, 2);

        const frFreqs = [];
        const bws = [];
        const frIndices = [];
        const bwEdgeIndices = [];

        selected.forEach((m) => {
          const mi = m.idx;
          const mval = m.val;
          const frF = parseFloat(labels[mi]);
          const threshold = mval + 3; // -3dB acima do vale

          // Encontrar limites de banda para este vale
          let lowerIdx = mi;
          for (let i = mi; i >= 0; i--) {
            if (data[i] >= threshold) {
              lowerIdx = i > 0 ? i : 0;
              break;
            }
            if (i === 0) lowerIdx = 0;
          }

          let upperIdx = mi;
          for (let i = mi; i < data.length; i++) {
            if (data[i] >= threshold) {
              upperIdx = i < data.length - 1 ? i : data.length - 1;
              break;
            }
            if (i === data.length - 1) upperIdx = data.length - 1;
          }

          const fL = parseFloat(labels[lowerIdx]);
          const fU = parseFloat(labels[upperIdx]);
          const bwv = fU - fL;

          frFreqs.push(frF);
          bws.push(bwv);
          frIndices.push(mi);
          bwEdgeIndices.push({ lower: lowerIdx, upper: upperIdx });
        });

        // Armazenar fr e BW globalmente (arrays quando há múltiplas ressonâncias)
        window.lastFr = frFreqs;
        window.lastBw = bws;

        // Mapear dados apenas nos índices exatos (ressonâncias e extremidades BW)
        const frPointData = labels.map((_, idx) => (frIndices.includes(idx) ? data[idx] : null));
        const allBwEdgeIdx = bwEdgeIndices.reduce((acc, p) => acc.concat([p.lower, p.upper]), []);
        const bwPointsData = labels.map((_, idx) => (allBwEdgeIdx.includes(idx) ? data[idx] : null));

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Simulados (Cruz de Jerusalém)",
                data: data,
                borderColor: "#000",
                borderWidth: 1.5,
                pointRadius: 0,
                fill: false,
                tension: 0.1,
              },
              {
                label: `fr = ${frFreq.toFixed(2)} GHz`,
                data: frPointData,
                borderColor: "#ff0000",
                borderWidth: 3,
                borderDash: [5, 5],
                pointRadius: 6,
                pointBackgroundColor: "#ff0000",
                pointBorderColor: "#ff0000",
                fill: false,
                tension: 0,
                showLine: false,
              },
              {
                label: `BW = ${bw.toFixed(2)} GHz (-3dB)`,
                data: bwPointsData,
                borderColor: "#0066cc",
                borderWidth: 3,
                borderDash: [3, 3],
                pointRadius: 6,
                pointBackgroundColor: "#0066cc",
                pointBorderColor: "#0066cc",
                fill: false,
                tension: 0,
                showLine: false,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
              x: {
                title: {
                  display: true,
                  text: "Freqüência (GHz)",
                  font: { family: "Times New Roman", size: 14 },
                },
                grid: { color: "#eee" },
              },
              y: {
                min: -60,
                max: 0,
                title: {
                  display: true,
                  text: "Potência Transmitida (dB)",
                  font: { family: "Times New Roman", size: 14 },
                },
                grid: { color: "#eee" },
              },
            },
            plugins: {
              legend: { labels: { font: { family: "Times New Roman" } } },
            },
          },
        });

        // Exibir informações de fr e BW
        let infoBox = document.getElementById("resonanceInfo");
        if (!infoBox) {
          infoBox = document.createElement("div");
          infoBox.id = "resonanceInfo";
          infoBox.style.cssText =
            "margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 4px; font-family: 'Times New Roman'; font-size: 14px;";
          document
            .querySelector(".chart-container")
            .parentNode.insertBefore(
              infoBox,
              document.querySelector(".chart-container").nextSibling,
            );
        }
        // Montar texto informativo para uma ou duas ressonâncias
        let infoHtml = "";
        if (frFreqs && frFreqs.length > 1) {
          frFreqs.forEach((fr, idx) => {
            const bwv = bws[idx];
            const edges = bwEdgeIndices[idx];
            const fLlbl = edges ? parseFloat(labels[edges.lower]).toFixed(2) : "-";
            const fUlbl = edges ? parseFloat(labels[edges.upper]).toFixed(2) : "-";
            infoHtml += `<strong>fr${idx + 1}:</strong> ${fr.toFixed(2)} GHz | <strong>BW${idx + 1}:</strong> ${bwv.toFixed(2)} GHz (${fLlbl} - ${fUlbl} GHz)`;
            if (idx < frFreqs.length - 1) infoHtml += " &nbsp; | &nbsp; ";
          });
        } else if (frFreqs && frFreqs.length === 1) {
          const fr = frFreqs[0];
          const bwv = bws[0];
          const edges = bwEdgeIndices[0];
          const fLlbl = edges ? parseFloat(labels[edges.lower]).toFixed(2) : "-";
          const fUlbl = edges ? parseFloat(labels[edges.upper]).toFixed(2) : "-";
          infoHtml = `<strong>Frequência de Ressonância (fr):</strong> ${fr.toFixed(2)} GHz | <strong>Banda Passante (BW):</strong> ${bwv.toFixed(2)} GHz (${fLlbl} - ${fUlbl} GHz)`;
        } else {
          infoHtml = `Nenhuma ressonância detectada.`;
        }
        infoBox.innerHTML = infoHtml;
      }

      function exportToCSV() {
        if (!chart || !chart.data.labels.length) {
          alert(
            "Nenhum dado disponível para exportar. Ajuste os parâmetros e gere o gráfico primeiro.",
          );
          return;
        }
        let csv = "Frequência (GHz);S21 (dB)\n";
        chart.data.labels.forEach((freq, index) => {
          const s21 = chart.data.datasets[0].data[index];
          csv += `${freq};${s21}\n`;
        });
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        if (link.download !== undefined) {
          const url = URL.createObjectURL(blob);
          link.setAttribute("href", url);
          link.setAttribute("download", "dados_s21_cruz_jerusalem.csv");
          link.style.visibility = "hidden";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
      }

      // Nenhuma simulação inicial: aguarda o ajuste do usuário.
    </script>
  </body>
</html>
