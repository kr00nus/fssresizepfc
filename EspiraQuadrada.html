<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FSS - Espira Quadrada (ECM Completo)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="src/css/styles.css">
  </head>
  <body>
    <div class="dashboard">
      <div class="panel params">
        <h2>Parameters</h2>

        <h3>Frequency Parameters</h3>
        <div class="control-group">
          <div class="header-row">
            <label>Start Freq (GHz)</label>
            <input type="number" id="fStart_num" value="5" step="1" />
          </div>
          <input
            type="range"
            id="fStart_slider"
            min="1"
            max="15"
            step="1"
            value="5"
          />
        </div>

        <div class="control-group">
          <div class="header-row">
            <label>End Freq (GHz)</label>
            <input type="number" id="fEnd_num" value="25" step="1" />
          </div>
          <input
            type="range"
            id="fEnd_slider"
            min="16"
            max="40"
            step="1"
            value="25"
          />
        </div>

        <h3>Cell Size Parameters</h3>
        <div
          class="control-group"
          style="border-left: 4px solid #007bff; padding-left: 5px"
        >
          <div class="header-row">
            <label>Period p (mm)</label>
            <input type="number" id="p_num" value="5.250" step="0.001" />
          </div>
          <input
            type="range"
            id="p_slider"
            min="1.0"
            max="15.0"
            step="0.001"
            value="5.250"
          />
        </div>

        <div
          class="control-group"
          style="border-left: 4px solid #28a745; padding-left: 5px"
        >
          <div class="header-row">
            <label>Loop size d (mm)</label>
            <input type="number" id="d_num" value="5.000" step="0.001" />
          </div>
          <input
            type="range"
            id="d_slider"
            min="0.5"
            max="14.9"
            step="0.001"
            value="5.000"
          />
        </div>

        <div class="control-group">
          <div class="header-row">
            <label>Strip width w (mm)</label>
            <input type="number" id="w_num" value="0.470" step="0.001" />
          </div>
          <input
            type="range"
            id="w_slider"
            min="0.01"
            max="2.0"
            step="0.001"
            value="0.470"
          />
        </div>

        <div
          class="control-group"
          style="background: #f8f9fa; padding: 5px; border-radius: 4px"
        >
          <div class="header-row">
            <label>Gap g (calculated: p - d)</label>
            <input
              type="number"
              id="g_num"
              value="0.250"
              readonly
              style="background: #e9ecef; border: 1px solid #ced4da"
            />
          </div>
        </div>

        <h3>Substrate Parameters</h3>
        <div class="control-group">
          <div class="header-row">
            <label>Substrate</label>
            <select id="substrate_select">
              <option value="manual">Manual</option>
              <option value="RO3003">RO3003 (εr=3.00, h=1.52mm)</option>
              <option value="RO3006">RO3006 (εr=6.50, h=1.28mm)</option>
            </select>
          </div>
        </div>

        <div class="control-group">
          <div class="header-row">
            <label>Substrate thickness h (mm)</label>
            <input type="number" id="h_sub_num" value="10.0" step="0.1" />
          </div>
          <input
            type="range"
            id="h_sub_slider"
            min="0.1"
            max="10.0"
            step="0.1"
            value="10.0"
          />
        </div>

        <div class="control-group">
          <div class="header-row">
            <label>Real Permittivity (εr)</label>
            <input type="number" id="er_num" value="1.30" step="0.01" />
          </div>
          <input
            type="range"
            id="er_slider"
            min="1.0"
            max="15.0"
            step="0.01"
            value="1.30"
          />
        </div>

        <div
          class="control-group"
          style="background: #f8f9fa; padding: 5px; border-radius: 4px"
        >
          <div class="header-row">
            <label>Effective Dielectric (ε_eff)</label>
            <input
              type="number"
              id="er_eff_num"
              value="1.145"
              readonly
              style="
                background: #e9ecef;
                border: 1px solid #ced4da;
                color: #cc0000;
                font-weight: bold;
              "
            />
          </div>
        </div>
      </div>

      <div class="visuals">
        <div class="panel">
          <h2>Resposta de Transmissão (S21)</h2>
          <div class="chart-container">
            <canvas id="fssChart"></canvas>
          </div>
          <button id="exportBtn" style="margin-top:10px; padding:8px 16px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer;">Exportar CSV</button>
        </div>

        <div class="panel">
          <h2>Célula Unitária - Espira Quadrada</h2>
          <div class="geometry-container">
            <canvas id="shapeCanvas" width="400" height="400"></canvas>
            <div class="geo-legend">
              <strong>Linha pontilhada:</strong> Limites do período (p x p)<br />
              Cálculo reajustado para física pura sem limite de amortecimento
              virtual.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/js/ui_espira.js"></script>
  </body>
</html>
