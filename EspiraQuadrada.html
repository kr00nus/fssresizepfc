<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FSS - Espira Quadrada (Matlab eBook)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="panel params">
        <h2>Parâmetros (Padrão: Fig. 4.5)</h2>
        <div class="params-grid">
          <div class="param-col">
            <h3>Parâmetros Físicos</h3>
            <div
              class="control-group"
              style="border-left: 4px solid #007bff; padding-left: 5px"
            >
              <div class="header-row">
                <label>Período p (mm)</label>
                <input type="number" id="p_num" value="8.966" step="0.001" />
              </div>
              <input
                type="range"
                id="p_slider"
                min="0"
                max="15.0"
                step="0.001"
                value="8.966"
              />
            </div>

            <div
              class="control-group"
              style="border-left: 4px solid #28a745; padding-left: 5px"
            >
              <div class="header-row">
                <label>Tamanho d (mm)</label>
                <input type="number" id="d_num" value="6.045" step="0.001" />
              </div>
              <input
                type="range"
                id="d_slider"
                min="0"
                max="14.9"
                step="0.001"
                value="6.045"
              />
            </div>

            <div class="control-group">
              <div class="header-row">
                <label>Largura w (mm)</label>
                <input type="number" id="w_num" value="0.305" step="0.001" />
              </div>
              <input
                type="range"
                id="w_slider"
                min="0"
                max="2.0"
                step="0.001"
                value="0.305"
              />
            </div>

            <div
              class="control-group"
              style="background: #f8f9fa; padding: 5px; border-radius: 4px"
            >
              <div class="header-row">
                <label>Gap g (calculado: p - d)</label>
                <input
                  type="number"
                  id="g_num"
                  value="2.921"
                  readonly
                  style="background: #e9ecef; border: 1px solid #ced4da"
                />
              </div>
            </div>
          </div>

          <div class="param-col">
            <h3>Parâmetros de Frequência</h3>
            <div class="control-group">
              <div class="header-row">
                <label>Freq. Inicial (GHz)</label>
                <input type="number" id="fStart_num" value="10" step="0.1" />
              </div>
              <input
                type="range"
                id="fStart_slider"
                min="0"
                max="50"
                step="0.1"
                value="10"
              />
            </div>

            <div class="control-group">
              <div class="header-row">
                <label>Freq. Final (GHz)</label>
                <input type="number" id="fEnd_num" value="25" step="0.1" />
              </div>
              <input
                type="range"
                id="fEnd_slider"
                min="0"
                max="50"
                step="0.1"
                value="25"
              />
            </div>
          </div>

          <div class="param-col">
            <h3>Parâmetros do Substrato</h3>
            <div class="control-group">
              <div class="header-row">
                <label>Substrato</label>
                <select id="substrate_select">
                  <option value="manual">Manual</option>
                  <option value="RO3003">RO3003 (εr=3.00, h=1.52mm)</option>
                  <option value="RO3006">RO3006 (εr=6.50, h=1.28mm)</option>
                  <option value="RT5880">Rogers RT/duroid 5880 (εr=2.20, h=0.254mm)</option>
                  <option value="RO4350B">Rogers RO4350B (εr=3.66, h=0.762mm)</option>
                  <option value="RF35">Taconic RF-35 (εr=3.50, h=0.762mm)</option>
                  <option value="TMM4">Rogers TMM 4 (εr=4.50, h=0.381mm)</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <div class="header-row">
                <label>Espessura do Substrato h (mm)</label>
                <input type="number" id="h_sub_num" value="1.00" step="0.01" />
              </div>
              <input
                type="range"
                id="h_sub_slider"
                min="0"
                max="10.0"
                step="0.01"
                value="1.00"
              />
            </div>

            <div class="control-group">
              <div class="header-row">
                <label>Permissividade Real (εr)</label>
                <input type="number" id="er_num" value="1.12" step="0.01" />
              </div>
              <input
                type="range"
                id="er_slider"
                min="1.0"
                max="15.0"
                step="0.01"
                value="1.12"
              />
            </div>

            <div
              class="control-group"
              style="background: #f8f9fa; padding: 5px; border-radius: 4px"
            >
              <div class="header-row">
                <label>Dielétrico Efetivo (ε_eff)</label>
                <input
                  type="number"
                  id="er_eff_num"
                  value="1.02"
                  readonly
                  style="
                    background: #e9ecef;
                    border: 1px solid #ced4da;
                    color: #cc0000;
                    font-weight: bold;
                  "
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="visuals">
        <div class="panel">
          <h2>Resposta de Transmissão (S21)</h2>
          <div class="chart-container">
            <canvas id="fssChart"></canvas>
          </div>
          <button
            id="exportBtn"
            style="
              margin-top: 10px;
              padding: 8px 16px;
              background: #007bff;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            Exportar CSV
          </button>
        </div>

        <div class="panel">
          <h2>Célula Unitária - Espira Quadrada</h2>
          <div class="geometry-container">
            <canvas id="shapeCanvas" width="400" height="400"></canvas>
            <div class="geo-legend">
              <strong>Linha pontilhada:</strong> Limites da Célula Unitária (p x
              p)<br />
              As cotas representam com exatidão matemática o Modelo Equivalente.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/js/ui_espira.js"></script>
  </body>
</html>
