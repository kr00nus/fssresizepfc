<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FSS - Espira Quadrada (Campos, 2008)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: "Times New Roman", serif;
        background-color: #eef2f5;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      .dashboard {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 20px;
        max-width: 1300px;
        margin: auto;
      }
      .panel {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
      }
      h2 {
        text-align: center;
        color: #000;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        margin-top: 0;
        font-size: 1.4em;
      }

      .control-group {
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px dashed #eee;
      }
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
      }
      label {
        font-weight: bold;
        font-size: 0.9em;
      }
      input[type="number"] {
        width: 70px;
        padding: 4px;
        border: 1px solid #ccc;
        border-radius: 3px;
        font-family: "Times New Roman";
      }
      input[type="range"] {
        width: 100%;
        cursor: pointer;
      }

      .visuals {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .chart-container {
        position: relative;
        height: 400px;
        width: 100%;
        border: 1px solid #000;
        padding: 10px;
        box-sizing: border-box;
      }

      .geometry-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        border: 1px solid #000;
        padding: 15px;
        background: #fff;
      }
      canvas#shapeCanvas {
        background-color: #fafafa;
        border: 1px dashed #999;
      }
      .geo-legend {
        font-size: 0.85em;
        color: #555;
        margin-top: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <div class="panel">
        <h2>Parâmetros Físicos (n78)</h2>

        <div class="control-group">
          <div class="header-row">
            <label>Freq. Inicial (GHz)</label>
            <input type="number" id="fStart_num" value="1" step="0.5" />
          </div>
          <input
            type="range"
            id="fStart_slider"
            min="0.5"
            max="3"
            step="0.5"
            value="1"
          />
        </div>
        <div class="control-group">
          <div class="header-row">
            <label>Freq. Final (GHz)</label>
            <input type="number" id="fEnd_num" value="30" step="0.5" />
          </div>
          <input
            type="range"
            id="fEnd_slider"
            min="5"
            max="40"
            step="0.5"
            value="30"
          />
        </div>

        <div
          class="control-group"
          style="border-left: 4px solid #007bff; padding-left: 5px"
        >
          <div class="header-row">
            <label>Período p (mm)</label>
            <input type="number" id="p_num" value="5.00" step="0.01" />
          </div>
          <input
            type="range"
            id="p_slider"
            min="1.0"
            max="10.0"
            step="0.01"
            value="5.00"
          />
        </div>

        <div
          class="control-group"
          style="border-left: 4px solid #28a745; padding-left: 5px"
        >
          <div class="header-row">
            <label>Tam. Espira d (mm)</label>
            <input type="number" id="d_num" value="3.90" step="0.01" />
          </div>
          <input
            type="range"
            id="d_slider"
            min="0.5"
            max="9.9"
            step="0.01"
            value="3.90"
          />
        </div>

        <div class="control-group">
          <div class="header-row">
            <label>Largura Fita w (mm)</label>
            <input type="number" id="w_num" value="0.20" step="0.01" />
          </div>
          <input
            type="range"
            id="w_slider"
            min="0.01"
            max="1.0"
            step="0.01"
            value="0.20"
          />
        </div>

        <div
          class="control-group"
          style="background: #f8f9fa; padding: 5px; border-radius: 4px"
        >
          <div class="header-row">
            <label>Gap g (calculado: p - d)</label>
            <input
              type="number"
              id="g_num"
              value="1.10"
              readonly
              style="background: #e9ecef; border: 1px solid #ced4da"
            />
          </div>
        </div>

        <div class="control-group">
          <div class="header-row">
            <label>Dielétrico Efetivo (er)</label>
            <input type="number" id="er_num" value="1.0" step="0.01" />
          </div>
          <input
            type="range"
            id="er_slider"
            min="1.0"
            max="10.0"
            step="0.01"
            value="1.0"
          />
        </div>
      </div>

      <div class="visuals">
        <div class="panel">
          <h2>Resposta de Transmissão (S21) - Campos (2008)</h2>
          <div class="chart-container">
            <canvas id="fssChart"></canvas>
          </div>
        </div>

        <div class="panel">
          <h2>Célula Unitária - Espira Quadrada</h2>
          <div class="geometry-container">
            <canvas id="shapeCanvas" width="400" height="400"></canvas>
            <div class="geo-legend">
              <strong>Linha pontilhada:</strong> Limites do período (p x p)<br />
              Modelo equivalente rigoroso de Langley & Parker corrigido com
              fator (d/p).
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Sincronização UI
      function bindInputs(idPrefix) {
        const slider = document.getElementById(idPrefix + "_slider");
        const num = document.getElementById(idPrefix + "_num");
        slider.addEventListener("input", (e) => {
          num.value = parseFloat(e.target.value).toFixed(2);
          updateAll();
        });
        num.addEventListener("input", (e) => {
          slider.value = e.target.value;
          updateAll();
        });
      }
      ["fStart", "fEnd", "p", "d", "w", "er"].forEach(bindInputs);

      function mmToCm(value) {
        return value / 10;
      }

      let chart;

      // Desenho da Geometria em estilo CAD
      function drawGeometry(p, d, w, g) {
        const canvas = document.getElementById("shapeCanvas");
        const ctx = canvas.getContext("2d");
        const size = canvas.width;

        ctx.clearRect(0, 0, size, size);

        const viewSize = p * 2.2;
        const scale = size / viewSize;
        const center = size / 2;
        const pPixel = p * scale;
        const dPixel = d * scale;
        const wPixel = w * scale;
        const innerPixel = Math.max(0, dPixel - 2 * wPixel);

        function drawSquareLoop(cx, cy, isCenter) {
          ctx.fillStyle = isCenter ? "#003366" : "rgba(0, 51, 102, 0.12)";
          ctx.fillRect(cx - dPixel / 2, cy - dPixel / 2, dPixel, dPixel);
          if (innerPixel > 0) {
            ctx.clearRect(
              cx - innerPixel / 2,
              cy - innerPixel / 2,
              innerPixel,
              innerPixel,
            );
            if (!isCenter) {
              ctx.fillStyle = "#fafafa";
              ctx.fillRect(
                cx - innerPixel / 2,
                cy - innerPixel / 2,
                innerPixel,
                innerPixel,
              );
            }
          }
        }

        const neighbors = [
          { i: 0, j: -1 },
          { i: 0, j: 1 },
          { i: -1, j: 0 },
          { i: 1, j: 0 },
        ];
        neighbors.forEach((n) =>
          drawSquareLoop(center + n.i * pPixel, center + n.j * pPixel, false),
        );
        drawSquareLoop(center, center, true);

        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "rgba(0, 0, 0, 0.25)";
        ctx.lineWidth = 1;
        ctx.strokeRect(
          center - pPixel / 2,
          center - pPixel / 2,
          pPixel,
          pPixel,
        );
        ctx.setLineDash([]);

        ctx.fillStyle = "#cc0000";
        ctx.strokeStyle = "#cc0000";
        ctx.lineWidth = 1.2;
        ctx.font = "bold 13px 'Times New Roman'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        function drawCota(
          x1,
          y1,
          x2,
          y2,
          text,
          textOffsetX,
          textOffsetY,
          isVertical = false,
        ) {
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          const tick = 4;
          ctx.beginPath();
          if (isVertical) {
            ctx.moveTo(x1 - tick, y1);
            ctx.lineTo(x1 + tick, y1);
            ctx.moveTo(x2 - tick, y2);
            ctx.lineTo(x2 + tick, y2);
          } else {
            ctx.moveTo(x1, y1 - tick);
            ctx.lineTo(x1, y1 + tick);
            ctx.moveTo(x2, y2 - tick);
            ctx.lineTo(x2, y2 + tick);
          }
          ctx.stroke();

          const txtX = (x1 + x2) / 2 + textOffsetX;
          const txtY = (y1 + y2) / 2 + textOffsetY;
          const m = ctx.measureText(text);
          ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
          ctx.fillRect(txtX - m.width / 2 - 2, txtY - 8, m.width + 4, 16);
          ctx.fillStyle = "#cc0000";
          ctx.fillText(text, txtX, txtY);
        }

        const topY = center - pPixel / 2;
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(center - pPixel / 2, topY);
        ctx.lineTo(center - pPixel / 2, topY - 25);
        ctx.moveTo(center + pPixel / 2, topY);
        ctx.lineTo(center + pPixel / 2, topY - 25);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          center - pPixel / 2,
          topY - 18,
          center + pPixel / 2,
          topY - 18,
          "p = " + p.toFixed(2),
          0,
          -10,
        );

        const dY = center + dPixel / 2 + 25;
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(center - dPixel / 2, center + dPixel / 2);
        ctx.lineTo(center - dPixel / 2, dY + 5);
        ctx.moveTo(center + dPixel / 2, center + dPixel / 2);
        ctx.lineTo(center + dPixel / 2, dY + 5);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          center - dPixel / 2,
          dY,
          center + dPixel / 2,
          dY,
          "d = " + d.toFixed(3),
          0,
          10,
        );

        const leftX = center - dPixel / 2;
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(leftX, center);
        ctx.lineTo(leftX - 25, center);
        ctx.moveTo(leftX + wPixel, center);
        ctx.lineTo(leftX + wPixel - 25, center);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          leftX - 18,
          center,
          leftX + wPixel - 18,
          center,
          "w = " + w.toFixed(2),
          -15,
          0,
          true,
        );

        const centralRightEdge = center + dPixel / 2;
        const neighborLeftEdge = center + pPixel - dPixel / 2;
        ctx.strokeStyle = "rgba(204, 0, 0, 0.4)";
        ctx.beginPath();
        ctx.moveTo(centralRightEdge, center);
        ctx.lineTo(centralRightEdge, center + 20);
        ctx.moveTo(neighborLeftEdge, center);
        ctx.lineTo(neighborLeftEdge, center + 20);
        ctx.stroke();
        ctx.strokeStyle = "#cc0000";
        drawCota(
          centralRightEdge,
          center + 12,
          neighborLeftEdge,
          center + 12,
          "g = " + g.toFixed(3),
          0,
          10,
        );
      }

      // --- Formulação Rigorosa de Marcuvitz / Campos (2008) ---
      function calcTermF(period, width, lamb, ang) {
        const sinTerm = Math.sin((Math.PI * width) / (2 * period));
        if (sinTerm >= 1 || sinTerm <= 0) return 0;

        const C1 = (1 / Math.PI) * Math.log((1 + sinTerm) / (1 - sinTerm));
        const C2 = ((2 * period) / lamb) * Math.sin(ang);
        const G =
          0.5 -
          C1 -
          Math.pow(C2, 2) / 4 -
          Math.pow(C1, 2) / 4 -
          Math.pow(C2, 4) / 8;
        const logTerm = Math.log(1 / sinTerm);

        return (period / (lamb * Math.cos(ang))) * (logTerm - G);
      }

      function updateAll() {
        const fStart = parseFloat(document.getElementById("fStart_num").value);
        const fEnd = parseFloat(document.getElementById("fEnd_num").value);
        let p = parseFloat(document.getElementById("p_num").value);
        let d = parseFloat(document.getElementById("d_num").value);
        let w = parseFloat(document.getElementById("w_num").value);
        const er = parseFloat(document.getElementById("er_num").value);

        if (d >= p) {
          d = p - 0.01;
          document.getElementById("d_num").value = d.toFixed(2);
        }
        if (2 * w >= d) {
          w = d / 2 - 0.01;
          document.getElementById("w_num").value = w.toFixed(2);
        }

        const g = p - d;
        document.getElementById("g_num").value = g.toFixed(2);

        drawGeometry(p, d, w, g);

        const df = 0.05;
        const pCm = mmToCm(p);
        const dCm = mmToCm(d);
        const wCm = mmToCm(w);
        const gCm = mmToCm(g);

        const data = [];
        const labels = [];

        for (let freq = fStart; freq <= fEnd; freq += df) {
          const lamb = 30 / freq;
          const ang = 0; // Incidência normal

          try {
            // CORREÇÃO 1: O livro usa o fator d/p multiplicando tudo.
            // CORREÇÃO 2: A reatância indutiva depende do dobro da largura da fita (2w).
            const XL =
              (dCm / pCm) * calcTermF(pCm, 2 * wCm, lamb, ang) * Math.cos(ang);
            const BC = 4 * er * (dCm / pCm) * calcTermF(pCm, gCm, lamb, ang);

            const ct = 1 / (XL - 1 / BC);
            const pt = 1 / (1 + 0.25 * Math.pow(ct, 2));
            const pt_dB = 10 * Math.log10(pt);

            labels.push(freq.toFixed(2));
            data.push(Math.max(-60, pt_dB));
          } catch (e) {
            data.push(0);
          }
        }

        updateChart(labels, data);
      }

      function updateChart(labels, data) {
        const ctx = document.getElementById("fssChart").getContext("2d");
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Simulados (Livro Campos, 2008)",
                data: data,
                borderColor: "#000",
                borderWidth: 2,
                pointRadius: 0,
                fill: false,
                tension: 0.1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
              x: {
                title: {
                  display: true,
                  text: "Freqüência (GHz)",
                  font: { family: "Times New Roman", size: 14 },
                },
                grid: { color: "#eee" },
              },
              y: {
                min: -60,
                max: 0,
                title: {
                  display: true,
                  text: "Potência Transmitida (dB)",
                  font: { family: "Times New Roman", size: 14 },
                },
                grid: { color: "#eee" },
              },
            },
            plugins: {
              legend: { labels: { font: { family: "Times New Roman" } } },
            },
          },
        });
      }

      updateAll();
    </script>
  </body>
</html>
