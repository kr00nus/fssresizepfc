<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FSS - Estrela de 4 Pontas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="panel params">
        <h2><i class="fa-solid fa-star"></i> Parâmetros (Tapered Star)</h2>
        <div class="params-grid">
          <div class="param-col">
            <h3>
              <i class="fa-solid fa-ruler-combined"></i> Parâmetros Físicos
            </h3>

            <div
              class="control-group"
              style="border-left: 4px solid #d32f2f; padding-left: 5px"
            >
              <div class="header-row">
                <label>Período p (mm)</label>
                <input type="number" id="p_num" value="4.100" step="0.001" />
              </div>
              <input
                type="range"
                id="p_slider"
                min="1.0"
                max="30.0"
                step="0.001"
                value="4.100"
              />
            </div>

            <div
              class="control-group"
              style="border-left: 4px solid #1976d2; padding-left: 5px"
            >
              <div class="header-row">
                <label>Comp. Total a (mm)</label>
                <input type="number" id="a_num" value="3.250" step="0.001" />
              </div>
              <input
                type="range"
                id="a_slider"
                min="0.1"
                max="25.0"
                step="0.001"
                value="3.250"
              />
            </div>

            <div
              class="control-group"
              style="border-left: 4px solid #9c27b0; padding-left: 5px"
            >
              <div class="header-row">
                <label>Início da Ponta c (mm)</label>
                <input type="number" id="c_num" value="2.000" step="0.001" />
              </div>
              <input
                type="range"
                id="c_slider"
                min="0.1"
                max="25.0"
                step="0.001"
                value="2.000"
              />
            </div>

            <div
              class="control-group"
              style="border-left: 4px solid #f57c00; padding-left: 5px"
            >
              <div class="header-row">
                <label>Largura do Braço b (mm)</label>
                <input type="number" id="b_num" value="0.600" step="0.001" />
              </div>
              <input
                type="range"
                id="b_slider"
                min="0.1"
                max="10.0"
                step="0.001"
                value="0.600"
              />
            </div>

            <div
              class="control-group"
              style="border-left: 4px solid #388e3c; padding-left: 5px"
            >
              <div class="header-row">
                <label>Quadrado Central s (mm)</label>
                <input type="number" id="s_num" value="1.000" step="0.001" />
              </div>
              <input
                type="range"
                id="s_slider"
                min="0.1"
                max="15.0"
                step="0.001"
                value="1.000"
              />
            </div>
          </div>

          <div class="param-col">
            <h3><i class="fa-solid fa-wave-square"></i> Frequência</h3>
            <div class="control-group">
              <div class="header-row">
                <label>Freq. Inicial (GHz)</label>
                <input type="number" id="fStart_num" value="20.0" step="0.1" />
              </div>
              <input
                type="range"
                id="fStart_slider"
                min="1.0"
                max="60.0"
                step="0.1"
                value="20.0"
              />
            </div>

            <div class="control-group">
              <div class="header-row">
                <label>Freq. Final (GHz)</label>
                <input type="number" id="fEnd_num" value="35.0" step="0.1" />
              </div>
              <input
                type="range"
                id="fEnd_slider"
                min="1.0"
                max="60.0"
                step="0.1"
                value="35.0"
              />
            </div>
          </div>

          <div class="param-col">
            <h3><i class="fa-solid fa-layer-group"></i> Substrato</h3>
            <div class="control-group">
              <div class="header-row">
                <label>Material</label>
                <select id="substrate_select">
                  <option value="manual">Manual</option>
                  <option value="RO3003" selected>
                    RO3003 (εr=2.94, h=0.508)
                  </option>
                  <option value="FR4">FR-4 (εr=4.40, h=1.60)</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <div class="header-row">
                <label>Espessura h (mm)</label>
                <input
                  type="number"
                  id="h_sub_num"
                  value="0.508"
                  step="0.001"
                />
              </div>
              <input
                type="range"
                id="h_sub_slider"
                min="0.1"
                max="10.0"
                step="0.001"
                value="0.508"
              />
            </div>

            <div class="control-group">
              <div class="header-row">
                <label>Permissividade (εr)</label>
                <input type="number" id="er_num" value="2.94" step="0.01" />
              </div>
              <input
                type="range"
                id="er_slider"
                min="1.0"
                max="15.0"
                step="0.01"
                value="2.94"
              />
            </div>

            <div
              class="control-group"
              style="background: #f8f9fa; padding: 5px; border-radius: 4px"
            >
              <div class="header-row">
                <label>ε_eff (Modelo M=1.9)</label>
                <input
                  type="number"
                  id="er_eff_num"
                  value="1.00"
                  readonly
                  style="
                    background: #e9ecef;
                    border: 1px solid #ced4da;
                    font-weight: bold;
                  "
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="visuals">
        <div class="panel">
          <h2>
            <i class="fa-solid fa-chart-line"></i> Resposta de Transmissão (S21)
          </h2>
          <div class="chart-container">
            <canvas id="fssChart"></canvas>
          </div>
          <button
            id="exportBtn"
            style="
              margin-top: 10px;
              padding: 8px 16px;
              background: #2b6cb0;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
              font-weight: bold;
            "
          >
            <i class="fa-solid fa-download"></i> Exportar CSV
          </button>
        </div>

        <div class="panel">
          <h2>
            <i class="fa-solid fa-draw-polygon"></i> Geometria Tapered Star
          </h2>
          <div class="geometry-container">
            <canvas id="shapeCanvas" width="400" height="400"></canvas>
            <div class="geo-legend">
              <strong>Formulação:</strong> Mamedes, D. F. (2024). Parâmetro
              adicional <strong>c</strong> inserido para fidelidade CAD (ponta
              espetada).
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="src/js/ui_estrela4pontas.js"></script>
  </body>
</html>
